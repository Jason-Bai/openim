name: Bug
description: Report incorrect existing behavior.
title: "[BUG] "
labels:
  - bug
body:
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What is wrong?
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: Reproduction steps
      description: How can someone reproduce this bug?
      placeholder: |
        1. ...
        2. ...
        3. ...
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual result
      description: What happens now?
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected result
      description: What should happen?
    validations:
      required: true
  - type: textarea
    id: impact
    attributes:
      label: Impact
      description: Who or what is affected?
    validations:
      required: true
  - type: textarea
    id: verification
    attributes:
      label: Verification
      description: What test or command should prove the fix?
    validations:
      required: false
